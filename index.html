<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tillysoft Games</title>
    <link rel="icon" type="image/png" href="/logo_generated-clean-full-tinified.png" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: grid;
        place-items: center;
        background: #ffeedc;
      }
      .logo {
        width: min(90vw, 90vh);
        height: auto;
        aspect-ratio: 1 / 1;
        image-rendering: pixelated;
        opacity: 0;
      }
      .logo.loaded {
        animation: fadeIn 1.5s ease-in forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/logo_reversed_loop.gif" alt="Tillysoft Games" />
    <script>
      const logo = document.querySelector(".logo");
      const show = () => logo.classList.add("loaded");
      if (logo.complete && logo.naturalWidth > 0) show();
      else logo.addEventListener("load", show);
    </script>
  </body>
</html>
